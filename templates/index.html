<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIAP X - Image Processing</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <h2 class="logo">FIAP <span>X</span></h2>
            <nav>
                <button class="nav-btn active" onclick="showTab('upload')"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
                <button class="nav-btn" onclick="showTab('history')"><i class="fas fa-history"></i> Histórico</button>
                <button class="nav-btn" onclick="showTab('settings')"><i class="fas fa-cog"></i> Configurações</button>
            </nav>
            <button class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </aside>

        <main class="content">
            <section id="upload" class="tab-content active">
                <h1>Subir Vídeo</h1>
                <div class="upload-box" id="drop-area">
                    <i class="fas fa-film fa-3x"></i>
                    <p>Arraste seu vídeo aqui ou clique para selecionar</p>
                    <input type="file" id="fileElem" accept="video/*" style="display:none">
                    <button class="btn-primary" onclick="document.getElementById('fileElem').click()">Selecionar Arquivo</button>
                </div>
            </section>

            <section id="history" class="tab-content">
                <h1>Histórico de Processamento</h1>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Arquivo</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>video_teste_01.mp4</td>
                            <td><span class="badge success">Concluído</span></td>
                            <td>10/03/2026</td>
                            <td><button class="btn-text">Download</button></td>
                        </tr>
                        <tr>
                            <td>aula_fiap.mkv</td>
                            <td><span class="badge warning">Processando</span></td>
                            <td>10/03/2026</td>
                            <td><button class="btn-text">Ver Logs</button></td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section id="settings" class="tab-content">
                <h1>Configurações de IA</h1>
                <div class="settings-form">
                    <div class="form-group">
                        <label>Resolução de Saída</label>
                        <select>
                            <option>1080p (Full HD)</option>
                            <option>720p (HD)</option>
                            <option>480p (SD)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Algoritmos Ativos</label>
                        <label class="checkbox-label"><input type="checkbox" checked> Detecção de Objetos</label>
                        <label class="checkbox-label"><input type="checkbox"> Reconhecimento de Placas</label>
                        <label class="checkbox-label"><input type="checkbox"> Tracking de Movimento</label>
                    </div>
                    <button class="btn-primary">Salvar Ajustes</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../static/script.js"></script>
</body>
</html>
