services:
  web:
    build: .
    container_name: fiapx_web_app
    ports:
      - "5000:5000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    depends_on:
      - minio
    networks:
      - fiapx_network

  minio:
    image: minio/minio
    container_name: fiapx_minio
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console UI
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - fiapx_network

networks:
  fiapx_network:
    driver: bridge

volumes:
  minio_data: