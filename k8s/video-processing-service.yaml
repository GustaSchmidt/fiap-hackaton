apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-processing-service
  namespace: fiapx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: video-processing-service
  template:
    metadata:
      labels:
        app: video-processing-service
    spec:
      containers:
        - name: video-processing-service
          image: fiapx/video-processing-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: RABBITMQ_URL
            - name: VIDEO_UPLOAD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: VIDEO_UPLOAD_SERVICE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: REDIS_URL_PROCESSING
            - name: MAX_CONCURRENT_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MAX_CONCURRENT_WORKERS
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_BUCKET
            - name: FFMPEG_OUTPUT_RESOLUTION
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: FFMPEG_OUTPUT_RESOLUTION
            - name: FFMPEG_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: FFMPEG_TIMEOUT
