apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-upload-service
  namespace: fiapx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-upload-service
  template:
    metadata:
      labels:
        app: video-upload-service
    spec:
      containers:
        - name: video-upload-service
          image: fiapx/video-upload-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: DATABASE_URL_VIDEOS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: REDIS_URL_VIDEOS
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_SECRET_KEY
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: RABBITMQ_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: AUTH_SERVICE_URL
            - name: SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: video-upload-service
  namespace: fiapx
spec:
  selector:
    app: video-upload-service
  ports:
    - port: 8002
      targetPort: 8002
