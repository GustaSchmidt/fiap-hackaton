name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  test-video-upload-service:
    name: Test Video Upload Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/video-upload-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  test-video-processing-service:
    name: Test Video Processing Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/video-processing-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-auth-service
      - test-video-upload-service
      - test-video-processing-service
      - test-notification-service
    steps:
      - uses: actions/checkout@v4
      - name: Build Auth Service
        run: docker build -t fiapx/auth-service:${{ github.sha }} services/auth-service
      - name: Build Video Upload Service
        run: docker build -t fiapx/video-upload-service:${{ github.sha }} services/video-upload-service
      - name: Build Video Processing Service
        run: docker build -t fiapx/video-processing-service:${{ github.sha }} services/video-processing-service
      - name: Build Notification Service
        run: docker build -t fiapx/notification-service:${{ github.sha }} services/notification-service
      - name: Build API Gateway
        run: docker build -t fiapx/api-gateway:${{ github.sha }} services/api-gateway
