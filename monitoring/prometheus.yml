global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8001']

  - job_name: 'video-upload-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['video-upload-service:8002']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
